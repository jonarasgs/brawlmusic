<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Starr Sound • Player</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <h1 class="brand">Starr Sound</h1>
        <p class="muted">Player estilo streaming</p>

        <nav class="menu">
          <button class="menu-btn active">Início</button>
          <button class="menu-btn">Sua biblioteca</button>
          <button class="menu-btn">Eventos</button>
          <button class="menu-btn">Curtidas</button>
        </nav>

        <section>
          <h2 class="section-title">Playlists rápidas</h2>
          <div id="quickPlaylists" class="quick-list"></div>
        </section>
      </aside>

      <main class="content">
        <header class="topbar">
          <input id="searchInput" class="search" type="search" placeholder="Buscar música, evento, artista..." />
          <span class="tag">Fonte alvo: Nougat</span>
        </header>

        <section>
          <h2>Destaques</h2>
          <div id="highlightGrid" class="highlight-grid"></div>
        </section>

        <section>
          <h2>Todas as faixas</h2>
          <div id="tracksTable" class="tracks-table"></div>
        </section>
      </main>
    </div>

    <footer class="playerbar">
      <div class="nowplaying">
        <img id="coverImage" src="assets/covers/placeholder-cover.svg" alt="Capa" />
        <div>
          <p id="nowTitle">Nenhuma faixa</p>
          <p id="nowMeta" class="muted">Escolha uma música para tocar</p>
        </div>
      </div>

      <div class="center-controls">
        <div class="buttons">
          <button id="prevBtn">⏮</button>
          <button id="playPauseBtn">▶</button>
          <button id="nextBtn">⏭</button>
        </div>
        <input id="seekbar" type="range" min="0" max="100" value="0" />
      </div>

      <div class="extra-controls">
        <label>
          Vol
          <input id="volume" type="range" min="0" max="1" step="0.01" value="0.85" />
        </label>
      </div>

      <audio id="audio" preload="metadata"></audio>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
